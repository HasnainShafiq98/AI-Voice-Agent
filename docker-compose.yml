version: "3.9"

services:
  voice-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-voice-agent
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-auto}
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
